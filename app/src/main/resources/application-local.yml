spring:
  datasource:
    url: jdbc:h2:mem:ims;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  h2:
    console:
      enabled: true
  cache:
    type: none

ims:
  role: ALL
  aws:
    enabled: false
    sqs:
      enabled: false
    sns:
      enabled: false
  forecast:
    provider: ewma
  reorder:
    cron: 0 */5 * * * *

logging:
  level:
    com.ims: DEBUG
