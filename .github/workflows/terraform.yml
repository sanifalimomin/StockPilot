name: Terraform Validate

# Lightweight check on PRs that touch infra/. We deliberately do NOT run
# `terraform plan`/`apply` in CI: the Learner Lab vends session credentials
# that expire (~4h) and rotate, so applies are run manually from a session
# with fresh creds (see docs/RUNBOOK.md). This job only needs formatting and
# static validation, which require no AWS credentials.
on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: fmt + validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform fmt (check, recursive)
        run: terraform fmt -check -recursive

      # `terraform validate` needs an initialized working dir but no backend
      # access; -backend=false skips remote-state init so no AWS creds are required.
      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate
