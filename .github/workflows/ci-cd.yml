name: CI/CD

# Triggered on every push and pull request targeting main.
# - test/build jobs run on PRs and pushes (fast feedback, branch protection gate)
# - image build/push + ECS deploy run ONLY on push to main (post-merge)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run for the same ref when a newer commit arrives.
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1            # repo variable override: vars.AWS_REGION
  JAVA_VERSION: "21"
  NODE_VERSION: "20"

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Backend unit/integration tests (Spring Boot / Gradle)
  # ---------------------------------------------------------------------------
  backend-test:
    name: Backend tests (JDK 21 / Gradle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin) with Gradle cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Run tests
        # chmod is belt-and-braces: commits made from Windows can lose the
        # executable bit on gradlew, which breaks the Linux runner (exit 126).
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon test

  # ---------------------------------------------------------------------------
  # 2. Frontend build (React + Vite + TypeScript)
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Frontend build (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  build-and-push:
    name: Build & push image to ECR
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (Learner Lab session creds)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image reference
        id: image
        run: |
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          REPO="${{ vars.ECR_REPOSITORY || 'ims-dev-app' }}"
          echo "registry=$REGISTRY"             >> "$GITHUB_OUTPUT"
          echo "repo=$REPO"                      >> "$GITHUB_OUTPUT"
          echo "image=$REGISTRY/$REPO:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build & push ARM64 image (git SHA + latest)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          platforms: linux/arm64           # Graviton runtime
          push: true
          provenance: false                # ECR does not accept the OCI provenance manifest
          tags: |
            ${{ steps.image.outputs.registry }}/${{ steps.image.outputs.repo }}:${{ github.sha }}
            ${{ steps.image.outputs.registry }}/${{ steps.image.outputs.repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 4. Deploy: render new ECS task definitions with the freshly pushed image
  #    and force new deployments of BOTH Fargate services (API + worker).
  #    The scheduler task definition pins the :latest tag and is launched fresh
  #    by EventBridge each night, so it picks up the new image automatically.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (Learner Lab session creds)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || env.AWS_REGION }}

      - name: Download current task definition
        env:
          ECS_SERVICE: ${{ vars.ECS_SERVICE || 'ims-dev-api' }}
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'ims-dev-cluster' }}
        run: |
          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].taskDefinition' --output text)
          aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_ARN" \
            --query 'taskDefinition' --output json > task-definition.json
          echo "Fetched task definition: $TASK_DEF_ARN"

      - name: Render new task definition with the new image
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ vars.ECS_CONTAINER_NAME || 'api' }}
          image: ${{ needs.build-and-push.outputs.image }}

      - name: Deploy to ECS (register task def + force new deployment, wait for stable)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE || 'ims-dev-api' }}
          cluster: ${{ vars.ECS_CLUSTER || 'ims-dev-cluster' }}
          force-new-deployment: true
          wait-for-service-stability: true

      # ---- Worker service: same image, own task definition ------------------
      - name: Download current worker task definition
        env:
          ECS_WORKER_SERVICE: ${{ vars.ECS_WORKER_SERVICE || 'ims-dev-worker' }}
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'ims-dev-cluster' }}
        run: |
          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_WORKER_SERVICE" \
            --query 'services[0].taskDefinition' --output text)
          aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_ARN" \
            --query 'taskDefinition' --output json > worker-task-definition.json
          echo "Fetched worker task definition: $TASK_DEF_ARN"

      - name: Render worker task definition with the new image
        id: render-worker
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: worker-task-definition.json
          container-name: ${{ vars.ECS_WORKER_CONTAINER_NAME || 'worker' }}
          image: ${{ needs.build-and-push.outputs.image }}

      - name: Deploy worker to ECS (force new deployment, wait for stable)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-worker.outputs.task-definition }}
          service: ${{ vars.ECS_WORKER_SERVICE || 'ims-dev-worker' }}
          cluster: ${{ vars.ECS_CLUSTER || 'ims-dev-cluster' }}
          force-new-deployment: true
          wait-for-service-stability: true

  # ---------------------------------------------------------------------------
  # 5. Deploy the frontend: build the Vite bundle against the deployed ALB and
  #    sync it to the S3 website bucket (provisioned by Terraform). Runs after
  #    the API deploy so the site always points at a live, up-to-date API.
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy frontend to S3
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials (Learner Lab session creds)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || env.AWS_REGION }}

      - name: Resolve API URL and frontend bucket
        id: targets
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names "${{ vars.ALB_NAME || 'ims-dev-alb' }}" \
            --query 'LoadBalancers[0].DNSName' --output text)
          BUCKET="${{ vars.FRONTEND_BUCKET }}"
          if [ -z "$BUCKET" ]; then
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            BUCKET="ims-dev-frontend-$ACCOUNT_ID"
          fi
          echo "api=http://$ALB_DNS" >> "$GITHUB_OUTPUT"
          echo "bucket=$BUCKET"      >> "$GITHUB_OUTPUT"
          echo "Building against http://$ALB_DNS, deploying to s3://$BUCKET"

      - name: Install dependencies
        run: npm ci

      - name: Build with the deployed API baked in
        env:
          VITE_API_BASE_URL: ${{ steps.targets.outputs.api }}
        run: npm run build

      - name: Sync build to the S3 website bucket
        run: aws s3 sync dist "s3://${{ steps.targets.outputs.bucket }}" --delete
